name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: contracts + clients + docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Contract tests
        run: forge test -vvv

      - name: Package tests
        run: pnpm run test

      - name: Typecheck
        run: pnpm run typecheck

      - name: Docs skill mirror check
        run: pnpm run docs:check-skill

      - name: App build
        run: pnpm --filter boon-app build

      - name: Docs build
        run: pnpm run docs:build
